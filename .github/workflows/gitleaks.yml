name: Gitleaks

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # varredura semanal para pegar segredos que vazaram em branches antigos
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  scan:
    name: Scan repo for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # sem GITLEAKS_LICENSE: ok em repos públicos
          GITLEAKS_CONFIG: .gitleaks.toml
